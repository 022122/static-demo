<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nothing Here</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #666666;
            --accent: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            cursor: default;
        }

        /* 细腻的噪点纹理 */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.04;
            z-index: 50;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .content {
            text-align: center;
            z-index: 10;
        }

        .title {
            font-size: clamp(3rem, 12vw, 9rem);
            font-weight: 300;
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 1.5rem;
            animation: fadeIn 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .line {
            width: 0;
            height: 1px;
            background: var(--accent);
            margin: 2.5rem auto;
            animation: growLine 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards;
            animation-delay: 0.6s;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: clamp(1rem, 2vw, 1.5rem);
            letter-spacing: 0.02em;
            animation: fadeIn 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.8s;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); filter: blur(15px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes growLine {
            from { width: 0; }
            to { width: 120px; }
        }

        /* 呼吸感的光影跟随 */
        .cursor-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: width 0.5s ease, height 0.5s ease;
        }

        /* 底栏 */
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 40;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            animation: fadeInFooter 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 1.4s;
            opacity: 0;
        }

        .footer-bar .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
        }

        .footer-bar .divider {
            width: 1px;
            height: 12px;
            background: var(--accent);
            margin: 0 0.6rem;
        }

        .footer-bar a {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 0.04em;
            transition: color 0.3s ease;
            position: relative;
        }

        .footer-bar a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--text-main);
            transition: width 0.3s ease;
        }

        .footer-bar a:hover {
            color: var(--text-main);
        }

        .footer-bar a:hover::after {
            width: 100%;
        }

        @keyframes fadeInFooter {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="cursor-glow" id="glow"></div>

    <div class="content">
        <h1 class="title">Nothing here.</h1>
        <div class="line"></div>
        <p class="subtitle">Less is more, but nothing is everything.</p>
    </div>

    <footer class="footer-bar">
        <span class="label">Works</span>
        <span class="divider"></span>
        <a href="./slime/">Slime Cluster Finder</a>
    </footer>

    <script>
        const glow = document.getElementById('glow');
        
        // 鼠标跟随
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // 使用 requestAnimationFrame 优化性能
            requestAnimationFrame(() => {
                glow.style.left = x + 'px';
                glow.style.top = y + 'px';
            });
        });

        // 交互时的微妙反馈
        document.addEventListener('mousedown', () => {
            glow.style.width = '700px';
            glow.style.height = '700px';
        });

        document.addEventListener('mouseup', () => {
            glow.style.width = '500px';
            glow.style.height = '500px';
        });
    </script>
</body>
</html>
