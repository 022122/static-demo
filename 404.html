<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Void</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #666666;
            --accent: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            cursor: default;
        }

        /* 延续首页的噪点纹理 */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.04;
            z-index: 50;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .content {
            text-align: center;
            z-index: 10;
        }

        .title {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 300;
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 1rem;
            animation: fadeIn 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .line {
            width: 0;
            height: 1px;
            background: var(--accent);
            margin: 2rem auto;
            animation: growLine 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards;
            animation-delay: 0.6s;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: clamp(1rem, 2vw, 1.5rem);
            letter-spacing: 0.02em;
            margin-bottom: 3rem;
            animation: fadeIn 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.8s;
            opacity: 0;
        }

        /* 极简返回链接 */
        .back-link {
            display: inline-block;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            text-decoration: none;
            transition: all 0.4s ease;
            opacity: 0;
            animation: fadeIn 3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 1.2s;
            position: relative;
            padding: 10px 20px;
        }

        .back-link:hover {
            color: var(--text-main);
            letter-spacing: 0.4em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes growLine {
            from { width: 0; }
            to { width: 80px; }
        }

        /* 呼吸感的光影跟随 */
        .cursor-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: width 0.5s ease, height 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="cursor-glow" id="glow"></div>

    <div class="content">
        <h1 class="title">404</h1>
        <div class="line"></div>
        <p class="subtitle">You've wandered into the void.</p>
        <a href="/" class="back-link">[ Return to Silence ]</a>
    </div>

    <script>
        const glow = document.getElementById('glow');
        
        // 鼠标跟随效果
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            requestAnimationFrame(() => {
                glow.style.left = x + 'px';
                glow.style.top = y + 'px';
            });
        });

        // 点击时的微妙交互
        document.addEventListener('mousedown', () => {
            glow.style.width = '700px';
            glow.style.height = '700px';
            glow.style.background = 'radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 70%)';
        });

        document.addEventListener('mouseup', () => {
            glow.style.width = '500px';
            glow.style.height = '500px';
            glow.style.background = 'radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 70%)';
        });
    </script>
</body>
</html>
